<!-- Phase 3 · Remotion: cutting_plan + render → outputs/v1.mp4
     Real content lives in _phase_3_panel.html which is hx-polled every 3s
     so the user always sees current state (running indicator, current step,
     elapsed time) instead of a stale snapshot. -->

<div hx-get="/runs/{{ project }}/{{ run_id }}/phase3_panel"
     hx-trigger="load, every 3s, phase3-refresh from:body"
     hx-swap="innerHTML"
     hx-on::before-swap="window.__savedScrollY = window.scrollY"
     hx-on::after-swap="if (typeof window.__savedScrollY === 'number') window.scrollTo(0, window.__savedScrollY)">
  <div class="rounded-lg border border-amber-700/40 bg-amber-950/15 px-5 py-12 text-center text-amber-300 text-sm">
    Loading Phase 3 status...
  </div>
</div>
