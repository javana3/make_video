<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Promo Video Pipeline{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-mono, code, pre { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* Markdown rendering */
    .prose-brief h1 { font-size: 1.875rem; font-weight: 700; margin: 0 0 1rem; color: rgb(248 250 252); }
    .prose-brief h2 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.5rem; color: rgb(226 232 240); border-bottom: 1px solid rgb(51 65 85); padding-bottom: 0.25rem; }
    .prose-brief h3 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.4rem; color: rgb(203 213 225); }
    .prose-brief p { margin: 0.5rem 0; line-height: 1.7; color: rgb(203 213 225); }
    .prose-brief ul { margin: 0.5rem 0 0.5rem 1.5rem; list-style: disc; }
    .prose-brief li { margin: 0.25rem 0; line-height: 1.65; color: rgb(203 213 225); }
    .prose-brief strong { color: rgb(241 245 249); }
    .prose-brief a { color: rgb(56 189 248); text-decoration: underline; }
    .prose-brief code { background: rgb(30 41 59); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.85em; }
    .prose-brief blockquote { border-left: 3px solid rgb(71 85 105); padding-left: 1rem; color: rgb(148 163 184); margin: 0.5rem 0; }

    /* Smooth state transitions */
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }

    /* Console scrolling */
    .console-log { max-height: 320px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgb(71 85 105) transparent; }
    .console-log::-webkit-scrollbar { width: 6px; }
    .console-log::-webkit-scrollbar-thumb { background: rgb(71 85 105); border-radius: 3px; }
  </style>
</head>
<body class="h-full bg-slate-950 text-slate-200 antialiased">

  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2 group">
          <span class="text-xl">🎬</span>
          <span class="font-semibold tracking-tight group-hover:text-emerald-400 transition">Promo Video Pipeline</span>
        </a>
        {% block breadcrumb %}{% endblock %}
      </div>
      <div class="flex items-center gap-4 text-sm">
        {% block header_actions %}{% endblock %}
        <a href="http://localhost:6006" target="_blank"
           class="text-slate-400 hover:text-sky-400 transition">
          📊 Phoenix
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-7xl mx-auto px-6 py-6 text-xs text-slate-600 border-t border-slate-900 mt-12">
    <span class="font-mono">viedo · linear Agent workflow</span>
  </footer>

</body>
</html>
