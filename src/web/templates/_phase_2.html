<!-- Phase 2 partial: SetupRunner.

Refresh strategy: SSE stream pushes 'phase2-changed' event ONLY when the
on-disk state actually changes (file mtimes / agent running flag). The outer
panel refetches in response to that event — so when the user is interacting
with a form (open dropdown, typing), nothing is wiped because nothing changed.
-->

<div id="phase2-sse-bridge"
     hx-ext="sse"
     sse-connect="/runs/{{ project }}/{{ run_id }}/phase2_state_stream">

  <div id="phase2-root"
       hx-get="/runs/{{ project }}/{{ run_id }}/phase2_panel"
       hx-trigger="load, sse:phase2-changed, phase2-refresh from:body"
       hx-swap="innerHTML">
    <div class="rounded-lg border border-slate-800 bg-slate-900/30 px-6 py-12 text-center text-slate-500 text-sm">
      Loading Phase 2...
    </div>
  </div>

</div>
