<!-- State: no setup_plan.json yet. Show generate button. -->

<div class="rounded-lg border border-slate-800 bg-slate-900/50 px-6 py-8 space-y-4">
  <div>
    <h2 class="text-lg font-semibold text-slate-100">Phase 2 · 生成启动计划</h2>
    <p class="text-sm text-slate-400 mt-1">
      Agent 2 会读 README / requirements.txt / package.json，推断启动方法，
      产出可审批的命令清单（install / seed / services）。生成后你审批，host 执行。
    </p>
  </div>
  <form hx-post="/runs/{{ project }}/{{ run_id }}/draft_plan"
        hx-target="#action-result"
        hx-swap="innerHTML">

      name="feedback"
      rows="2"
      placeholder="（可选）特殊要求，例如『后端用 8000 端口』、『跳过数据库 seed』..."
      class="w-full bg-slate-950 border border-slate-700 focus:border-emerald-500 rounded px-3 py-2 text-sm font-mono text-slate-200 placeholder-slate-600"></textarea>
    <button type="submit"
            class="mt-3 inline-flex items-center gap-2 px-4 py-2 bg-amber-500/20 hover:bg-amber-500/30 border border-amber-500/40 text-amber-300 rounded transition">
      <span>📋</span>
      <span>生成启动计划</span>
    </button>
  </form>
</div>
