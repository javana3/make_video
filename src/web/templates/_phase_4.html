<!-- Phase 4 · BGM: scaffold + MusicGen/MiniMax + mux → outputs/v1_bgm_final.mp4
     Real content lives in _phase_4_panel.html which is hx-polled every 3s
     so the user always sees current state (running indicator, current step,
     elapsed time) instead of a stale snapshot. -->

<div hx-get="/runs/{{ project }}/{{ run_id }}/phase4_panel"
     hx-trigger="load, every 3s, phase4-refresh from:body"
     hx-swap="innerHTML"
     hx-on::before-swap="window.__savedScrollY = window.scrollY"
     hx-on::after-swap="if (typeof window.__savedScrollY === 'number') window.scrollTo(0, window.__savedScrollY)">
  <div class="rounded-lg border border-pink-700/40 bg-pink-950/15 px-5 py-12 text-center text-pink-300 text-sm">
    Loading Phase 4 status...
  </div>
</div>
