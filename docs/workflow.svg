  <!-- ╭──────────────────────── Side legend (Observability) ────────────────────────╮ -->
  <g transform="translate(40, 1432)">
    <rect width="280" height="200" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="32" fill="#F1F5F9" font-size="14" font-weight="700">Observability stack</text>
    <text x="20" y="56" fill="#94A3B8" font-size="11" font-weight="500">events.jsonl + per-agent JSONL + Phoenix UI</text>

    <g font-size="11" font-weight="600">
      <circle cx="34" cy="86" r="5" fill="#6366F1"/>
      <text x="48" y="90" fill="#E2E8F0">@traced_agent decorator</text>

      <circle cx="34" cy="110" r="5" fill="#A855F7"/>
      <text x="48" y="114" fill="#E2E8F0">agent_logger() per-agent JSONL</text>

      <circle cx="34" cy="134" r="5" fill="#22D3EE"/>
      <text x="48" y="138" fill="#E2E8F0">EventBus.emit asset_verified</text>

      <circle cx="34" cy="158" r="5" fill="#F472B6"/>
      <text x="48" y="162" fill="#E2E8F0">Phoenix OTEL spans (LLM call)</text>

      <circle cx="34" cy="182" r="5" fill="#34D399"/>
      <text x="48" y="186" fill="#E2E8F0">verify.* spans (ffprobe gate)</text>
    </g>
  </g>

  <!-- ╭──────────────────────── Side legend (Tech) ────────────────────────╮ -->
  <g transform="translate(960, 1432)">
    <rect width="280" height="200" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="20" y="32" fill="#F1F5F9" font-size="14" font-weight="700">Tech stack</text>
    <text x="20" y="56" fill="#94A3B8" font-size="11" font-weight="500">Python · TypeScript · React · CUDA</text>

    <g font-size="11" font-weight="600">
      <text x="20" y="86" fill="#94A3B8">runtime</text>
      <text x="100" y="86" fill="#E2E8F0">Anthropic SDK · 火山方舟</text>

      <text x="20" y="110" fill="#94A3B8">visual</text>
      <text x="100" y="110" fill="#E2E8F0">OpenDesign · HyperFrames</text>

      <text x="20" y="134" fill="#94A3B8">edit</text>
      <text x="100" y="134" fill="#E2E8F0">Remotion · ffmpeg</text>

      <text x="20" y="158" fill="#94A3B8">audio</text>
      <text x="100" y="158" fill="#E2E8F0">MusicGen · edge-tts</text>

      <text x="20" y="182" fill="#94A3B8">UI</text>
      <text x="100" y="182" fill="#E2E8F0">FastAPI + HTMX + SSE</text>
    </g>
