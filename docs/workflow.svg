    <text x="640" y="1502" text-anchor="middle" fill="#475569" font-size="13" font-weight="500" letter-spacing="0.05em">1920×1080 · 30FPS · H264 + AAC · BILINGUAL</text>
    <g font-size="11" font-weight="600">
      <rect x="450" y="1518" width="100" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="500" y="1534" text-anchor="middle" fill="#475569">25-35 sec</text>
      <rect x="560" y="1518" width="80" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="600" y="1534" text-anchor="middle" fill="#475569">~3 MB</text>
      <rect x="650" y="1518" width="180" height="22" rx="11" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="740" y="1534" text-anchor="middle" fill="#475569">BGM + voiceover ducked</text>
    </g>
